<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet"/>

  <style>
    /* ─── RESET & BASE ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── VARIABLES ────────────────────────────────────── */
    :root {
      --cream:      #f0ece4;
      --sand:       #d8cfc0;
      --taupe:      #b8ab98;
      --olive:      #6b7340;
      --olive-lt:   #8a9456;
      --olive-dk:   #4e5530;
      --prussian:   #1b3a4b;
      --prussian-lt:#24526b;
      --background-color:#b9b2ac;
      --ink:        #1e1e18;
      --mist:       rgba(240,236,228,0.08);

      --card-bg:    rgba(240, 236, 228, 0.18);
      --border:     rgba(216, 207, 192, 0.35);
      --radius:     20px;
    }

    /* ─── NOISY BACKGROUND ─────────────────────────────── */
    html, body {
      min-height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: var(--background-color);
    }

    /* layered gradient blobs */
    body::before {
      content: '';
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(ellipse 70% 55% at 20% 30%,  #4d4e4788 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 20%,  #565851cc 0%, transparent 55%),
        radial-gradient(ellipse 80% 45% at 50% 80%,  #6b734030 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 90% 70%,  #0f223099 0%, transparent 55%),
        radial-gradient(ellipse 90% 90% at 40% 50%,  #243a2888 0%, transparent 70%);
      filter: blur(100px);
      z-index: 0;
    }

    /* grain overlay via SVG noise */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    /* ─── CARD ─────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      width: min(620px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px 44px;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── HEADER ROW (photo + logo) ────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    /* Photo */
    .photo-frame {
      flex-shrink: 0;
      width: 196px;
      height: 196px;
      border-radius: 24px;
      border: 2px solid var(--taupe);
      padding: 3px;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      display: block;
    }

    /* Logo */
    .logo-wrap {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .logo-wrap img {
      max-height: 48px;
      max-width: 130px;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.7);
    }

    /* Logo placeholder (shown when no png provided) */
    .logo-placeholder {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.55);
      border: 1.5px solid rgba(240,236,228,0.2);
      padding: 6px 14px;
      border-radius: 8px;
    }

    /* ─── NAME & BIO ───────────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--taupe), transparent);
      margin-bottom: 22px;
    }

    .name {
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--cream);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .title {
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 16px;
    }

    .bio {
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(240,236,228,0.72);
      margin-bottom: 32px;
    }

    /* ─── BUTTONS ──────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 14px;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 0;
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.1s ease;
      user-select: none;
    }

    /* ── Website button (warm grey) ── */
    .btn-website {
      background: #b0aca3;
      color: #1a1a17;
    }
    .btn-website:hover  { background: #c8c4bb; }
    .btn-website:active { background: #8f8b84; transform: translateY(1px); }

    /* ── LinkedIn button (prussian blue) ── */
    .btn-linkedin {
      background: #1b3a4b;
      color: rgba(240,236,228,0.95);
    }
    .btn-linkedin:hover  { background: #24526b; }
    .btn-linkedin:active { background: #122a38; transform: translateY(1px); }

    /* ─── BUTTON ICON ──────────────────────────────────── */
    .btn svg {
      width: 14px;
      height: 14px;
      opacity: 0.75;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- ── Header row: photo + logo ── -->
    <div class="card-header">
      <div class="photo-frame">
        <!--
          Replace the src below with your actual photo path.
          e.g. src="photo.jpg"
        -->
        <img
          src="images/photo2.jpeg"
          alt="Profile photo"
        />
      </div>

      <div class="logo-wrap">
        <!--
          Option A — use your actual PNG:
          <img src="logo.png" alt="Logo" />

          Option B — text fallback (shown by default):
        -->
        <!-- <span class="logo-placeholder">Studio</span> -->
      </div>
    </div>

    <div class="divider"></div>

    <!-- ── Name & bio ── -->
    <p class="name">Paul-Arthur Corto Lemarquis</p>
    <p class="title">Information Designer &amp; <br> Data Visualisation Designer</p>
    <p class="bio">
            I am an information designer who focuses on data visualisations and infographics with a touch of cartography. 
            My work also revolves around more classic graphic design when needed.  

    </p>

    <!-- ── CTA Buttons ── -->
    <div class="btn-row">
      <a class="btn btn-website" href="https://www.lemarquis.org" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Portfolio
      </a>

      <a class="btn btn-linkedin" href="https://www.linkedin.com/in/paul-arthur-lemarquis-63349a45/" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>
    </div>

  </div>

</body>
</html>
